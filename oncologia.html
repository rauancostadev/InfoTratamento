    <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- Cabeçalho / Navbar -->
<header class="navbar">
    <!-- Logo -->

        <a class="navbar-brand" 
           href="https://rauancostadev.github.io/InfoTratamento/index.html"
           rel="noopener noreferrer">
            <img src="https://ligacontraocancer.com.br/wp-content/themes/v01/assets/img/build/liga-contra-o-cancer-footer-red.f7f3067c.png" 
                 alt="Liga Contra o Câncer" 
                 title="Liga Contra o Câncer">
        </a>
    </div>

    <!-- Título central -->
    <h1 class="titulo-central">Central de Marcação</h1>

    <!-- Botão lateral -->
    <div class="side-menu-button" onclick="toggleSideMenu()">☰ Menu</div>

    <!-- Menu lateral -->
    <div id="side-menu" class="side-menu">
        <a href="index.html">Início</a>
        <a href="oncologia.html">Oncologia Clínica</a>
        <a href="radioterapia.html">Radioterapia</a>
        <a href="telefonia.html">Telefonia</a>

    </div>
</header>

<!-- Conteúdo principal -->
<header>
    <h1>Oncologia Clínica</h1>
</header>

<section class="radioterapia-section">

<div class="filtros">
    <input type="text" id="search" class="search" placeholder="Buscar médico...">
</div>

<div class="container" id="mainPage">
    <div class="grid" id="tumorGrid"></div>
</div>

<div class="container hidden" id="doctorPage">
    <div class="profile">
        <button class="back" onclick="goHome()">← Voltar</button>
        <h2 id="doctorName"></h2>
        <p><b>Áreas de atuação:</b></p>
        <div id="doctorAreas"></div>
    </div>
</div>

<!-- Grafo interativo Vis.js -->
<h2>Rede de Especialistas</h2>
<div id="network" style="height:500px;border:1px solid #ddd;border-radius:10px;margin-bottom:20px;"></div>

<footer>
    Liga Contra o Cancer • Central de Marcação
</footer>   

<!-- Biblioteca Vis.js -->
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script>
const data = {
"Mama":["Wendel Ferreira","Monalisa Ceciliana","Luciana Aquino","Carolina de Lima","Joilda Batista","Cristina Rocha","Ana Rafaela","Carolina Filgueira","Renanna Lyra","Laura Porto","Ayala Kaline","Marcele Aurea","Eliane Melo"],
"Primário Oculto":["Eliane Melo","Luciana Aquino","Rodrigo Jeronimo","Érika Ximenes"],
"TGI/Gastrointestinal":["Ana Rafaela","Ayala Kaline","Isafran Emanuele","Pedro Victor","Laura Porto","Pierre Gois","Moises"],
"Urológico":["Silvio Sales","Andrea Juliana","Rodrigo Jeronimo","Érika Ximenes","Carolina Filgueira","Isafran Emanuele","Carolina de Lima","Monalisa Ceciliana"],
"Melanoma/Pele":["Cristina Rocha","Alison Wagner","Pedro Victor","Eliane Melo","Ana Rafaela","Moises"],
"Colorretal":["Laura Porto","Pierre Gois","Silvio Sales","Marcele Aurea","Wendel Ferreira","Isafran Emanuele","Ayala Kaline","Sulene Cunha"],
"Cérebro":["Alison Wagner","Eliane Melo","Moises","Renanna Lyra"],
"Sarcoma":["Alison Wagner","Pierre Gois","Renanna Lyra"],
"Pulmão/Timo":["Wendel Ferreira","Sulene Cunha","Pedro Victor","Pierre Gois","Moises"],
"Cabeça e Pescoço":["Silvio Sales","Andrea Juliana","Carolina de Lima","Érika Ximenes"],
"Ginecológico":["Monalisa Ceciliana","Sulene Cunha","Luciana Aquino","Andrea Juliana","Carolina de Lima","Ayala Kaline","Carolina Filgueira","Marcele Aurea","Renanna Lyra"]
};

const grid = document.getElementById("tumorGrid");

function renderTumors(){
    grid.innerHTML="";
    Object.entries(data).forEach(([tumor,doctors])=>{
        const card=document.createElement("div");
        card.className="card";
        const title=document.createElement("h2");
        title.textContent=tumor;
        const count=document.createElement("div");
        count.className="count";
        count.textContent=doctors.length+" médicos";
        const ul=document.createElement("ul");
        doctors.sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(doc=>{
            const li=document.createElement("li");
            li.innerHTML="👨‍⚕️ "+doc;
            li.onclick=()=>openDoctor(doc);
            ul.appendChild(li);
        });
        card.appendChild(title);
        card.appendChild(count);
        card.appendChild(ul);
        grid.appendChild(card);
    });
}

function openDoctor(name){
    document.getElementById("mainPage").classList.add("hidden");
    document.getElementById("doctorPage").classList.remove("hidden");
    document.getElementById("doctorName").textContent=name;
    const areasDiv=document.getElementById("doctorAreas");
    areasDiv.innerHTML="";
    Object.entries(data).forEach(([tumor,doctors])=>{
        if(doctors.includes(name)){
            const badge=document.createElement("span");
            badge.className="badge1";
            badge.textContent=tumor;
            areasDiv.appendChild(badge);
        }
    });
}

function goHome(){
    document.getElementById("doctorPage").classList.add("hidden");
    document.getElementById("mainPage").classList.remove("hidden");
}

document.getElementById("search").addEventListener("input",e=>{
    const value=e.target.value.toLowerCase();
    document.querySelectorAll(".card li").forEach(li=>{
        const name=li.textContent.toLowerCase();
        li.style.display=name.includes(value)?"block":"none";
    });
});

renderTumors();

// --- Vis.js ---
function renderNetwork(){
    const nodes = [];
    const edges = [];
    const doctorSet = new Set();
    const tumorSet = new Set();
    Object.entries(data).forEach(([tumor, doctors])=>{
        tumorSet.add(tumor);
        doctors.forEach(doc=>doctorSet.add(doc));
    });
    tumorSet.forEach(t=>nodes.push({id:t,label:t,group:"tumor",shape:"box"}));
    doctorSet.forEach(d=>nodes.push({id:d,label:d,group:"doctor",shape:"dot",size:15}));
    Object.entries(data).forEach(([tumor, doctors])=>{
        doctors.forEach(doc=>edges.push({from:doc, to:tumor}));
    });
    const container = document.getElementById("network");
    const network = new vis.Network(container, {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    },{
        physics: {stabilization: false},
        groups: {doctor:{color:"#4CAF50"}, tumor:{color:"#FF9800"}}
    });
    network.on("click", params=>{
        if(params.nodes.length>0){
            const nodeId = params.nodes[0];
            alert("Selecionado: " + nodeId);
        }
    });
}

// Inicializar grafo
renderNetwork();

</script>

<script>
function toggleSideMenu() {
    const menu = document.getElementById('side-menu');
    if(menu.style.right === "0px") {
        menu.style.right = "-250px"; // fecha
    } else {
        menu.style.right = "0px"; // abre
    }
}
</script>

</body>
</html>
