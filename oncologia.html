<div class="container" id="mainPage">

</div>

<div class="container hidden" id="doctorPage">

<div class="profile">

<button class="back" onclick="goHome()">← Voltar</button>

<strong><script>

const data = {

"Mama":[
"Wendel Ferreira","Monalisa Ceciliana","Luciana Aquino","Carolina de Lima","Joilda Batista","Cristina Rocha",
"Ana Rafaela","Carolina Filgueira","Renanna Lyra","Laura Porto","Ayala Kaline","Marcele Aurea","Eliane Melo"
],

"Primário Oculto":[
"Eliane Melo","Luciana Aquino","Rodrigo Jeronimo","Érika Ximenes"
],

"TGI/Gastrointestinal":[
"Ana Rafaela","Ayala Kaline","Isafran Emanuele","Pedro Victor","Laura Porto","Pierre Gois","Moises"
],

"Urológico":[
"Silvio Sales","Andrea Juliana","Rodrigo Jeronimo","Érika Ximenes","Carolina Filgueira","Isafran Emanuele","Carolina de Lima","Monalisa Ceciliana"
],

"Melanoma/Pele":[
"Cristina Rocha","Alison Wagner","Pedro Victor","Eliane Melo","Ana Rafaela","Moises"
],

"Colorretal":[
"Laura Porto","Pierre Gois","Silvio Sales","Marcele Aurea","Wendel Ferreira","Isafran Emanuele","Ayala Kaline","Sulene Cunha"
],

"Cérebro":[
"Alison Wagner","Eliane Melo","Moises","Renanna Lyra"
],

"Sarcoma":[
"Alison Wagner","Pierre Gois","Renanna Lyra"
],

"Pulmão/Timo":[
"Wendel Ferreira","Sulene Cunha","Pedro Victor","Pierre Gois","Moises"
],

"Cabeça e Pescoço":[
"Silvio Sales","Andrea Juliana","Carolina de Lima","Érika Ximenes"
],

"Ginecológico":[
"Monalisa Ceciliana","Sulene Cunha","Luciana Aquino","Andrea Juliana","Carolina de Lima","Ayala Kaline","Carolina Filgueira","Marcele Aurea","Renanna Lyra"
],

};

const grid = document.getElementById("tumorGrid");

function renderTumors(){

grid.innerHTML="";

Object.entries(data).forEach(([tumor,doctors])=>{

const card=document.createElement("div");
card.className="card";

const title=document.createElement("h2");
title.textContent=tumor;

const count=document.createElement("div");
count.className="count";
count.textContent=doctors.length+" médicos";

const ul=document.createElement("ul");

doctors.forEach(doc=>{

const li=document.createElement("li");
li.textContent=doc;
li.onclick=()=>openDoctor(doc);

ul.appendChild(li);

});

card.appendChild(title);
card.appendChild(count);
card.appendChild(ul);

grid.appendChild(card);

});

}

function openDoctor(name){

document.getElementById("mainPage").classList.add("hidden");
document.getElementById("doctorPage").classList.remove("hidden");

document.getElementById("doctorName").textContent=name;

const areasDiv=document.getElementById("doctorAreas");
areasDiv.innerHTML="";

Object.entries(data).forEach(([tumor,doctors])=>{

if(doctors.includes(name)){

const badge=document.createElement("span");
badge.className="badge1";
badge.textContent=tumor;

areasDiv.appendChild(badge);

}

});

}

function goHome(){

document.getElementById("doctorPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");

}

document.getElementById("search").addEventListener("input",e=>{

const value=e.target.value.toLowerCase();

document.querySelectorAll(".card li").forEach(li=>{

const name=li.textContent.toLowerCase();

li.style.display=name.includes(value)?"block":"none";

});

});

renderTumors();

</script></strong>

<script>
function toggleSideMenu() {
    const menu = document.getElementById('side-menu');
    if(menu.style.right === "0px") {
        menu.style.right = "-250px"; // fecha
    } else {
        menu.style.right = "0px"; // abre
    }
}
</script>
